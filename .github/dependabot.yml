version: 2
updates:
  # Dépendances npm/pnpm (lit pnpm-lock.yaml)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Quarantaine : n'ouvre une PR que pour des versions publiées depuis ≥3 j.
    # Dépasse la fenêtre minimumReleaseAge de pnpm (24 h) → les installs passent,
    # et c'est une vraie défense supply-chain (on n'adopte pas une release du jour).
    cooldown:
      default-days: 3
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Patches isolés dans leur propre PR (type semver-patch)
      # → éligibles à l'auto-merge si la CI passe.
      patches:
        update-types: ["patch"]
      # Minors groupés à part → PR séparée, validation manuelle.
      # Les majors arrivent en PR individuelles (breaking changes à relire).
      minors:
        update-types: ["minor"]

  # Versions des actions GitHub (actions/checkout, setup-node, etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        update-types: ["minor", "patch", "major"]
