version: 2
updates:
  # Dépendances npm/pnpm (lit pnpm-lock.yaml)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Minor + patch regroupés en 1 seule PR (faible bruit).
      # Les majors arrivent en PR séparées pour relire les breaking changes.
      deps-mineures:
        update-types: ["minor", "patch"]

  # Versions des actions GitHub (actions/checkout, setup-node, etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        update-types: ["minor", "patch", "major"]
