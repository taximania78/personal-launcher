name: CI
on: [push, pull_request]

# Least privilege: the workflow only needs to read the repo.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: launcher_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://postgres:test@localhost:5432/launcher_test
      DATABASE_URL: postgres://postgres:test@localhost:5432/launcher_test
      DATABASE_URL_READ: postgres://postgres:test@localhost:5432/launcher_test
      N8N_TODO_WEBHOOK_URL: http://localhost/dummy
      N8N_TODO_WEBHOOK_TOKEN: ci_token
      NEXT_PUBLIC_WHOOGLE_URL: http://whoogle.local
      APP_READER_PWD: ci_reader
      APP_WRITER_PWD: ci_writer
      N8N_WRITER_PWD: ci_n8n
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: '22' }
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with: { version: 11 }
      - run: pnpm install --frozen-lockfile
      - name: Run migrations
        run: |
          OPTS="-c%20app.reader_pwd%3D${APP_READER_PWD}%20-c%20app.writer_pwd%3D${APP_WRITER_PWD}%20-c%20app.n8n_pwd%3D${N8N_WRITER_PWD}"
          DATABASE_URL_ADMIN="postgres://postgres:test@localhost:5432/launcher_test?options=${OPTS}" \
            pnpm migrate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
