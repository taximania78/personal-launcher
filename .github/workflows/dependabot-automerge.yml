name: Dependabot auto-merge

# Active l'auto-merge sur les PRs Dependabot, mais UNIQUEMENT pour les
# mises à jour patch (faible risque). L'auto-merge attend que le check
# requis `test` soit vert avant de fusionner ; minor/major restent manuelles.
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      - name: Enable auto-merge for patch updates
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
